name: Validate Tool Submission

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'tool-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci || npm install

      - name: Validate Repo Link
        run: node scripts/validate-submission.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
